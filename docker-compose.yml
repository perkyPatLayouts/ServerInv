services:
  # PostgreSQL (default - recommended)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: serverinv
      POSTGRES_PASSWORD: serverinv
      POSTGRES_DB: serverinv
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # MySQL (alternative - uncomment to use)
  # mysql:
  #   image: mysql:8
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: serverinv
  #     MYSQL_USER: serverinv
  #     MYSQL_PASSWORD: serverinv
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysqldata:/var/lib/mysql
  #   command: --default-authentication-plugin=mysql_native_password

  # MariaDB (alternative - uncomment to use)
  # mariadb:
  #   image: mariadb:10
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: serverinv
  #     MYSQL_USER: serverinv
  #     MYSQL_PASSWORD: serverinv
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mariadbdata:/var/lib/mysql

volumes:
  pgdata:
